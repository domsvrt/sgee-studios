services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgee-studios-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    networks:
      - sgee-network

  db:
    image: mysql:8.0
    container_name: sgee-studios-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - sgee-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sgee-studios-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - sgee-network

networks:
  sgee-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
